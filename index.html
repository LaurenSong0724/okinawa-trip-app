body{margin:0;font-family:TripFont,'Noto Sans TC',system-ui,sans-serif;background:#e0f7ff;color:#172033;overflow:hidden;user-select:none;line-height:1.6;}
button,input,select{font-family:inherit}
.app-outer{height:100vh;display:flex;justify-content:center;background-image:linear-gradient(rgba(255,255,255,.18),rgba(255,255,255,.32)),var(--bg);background-size:cover;background-position:center;}
@supports(height:100dvh){.app-outer{height:100dvh}}
.app-shell{width:100%;max-width:460px;height:100%;position:relative;overflow:hidden;background:rgba(255,255,255,.18);box-shadow:0 0 50px rgba(15,23,42,.18)}
.app-shell::before{content:"";position:absolute;inset:0;z-index:-2;background-image:linear-gradient(rgba(255,255,255,.10),rgba(255,255,255,.30)),var(--bg);background-size:cover;background-position:center top;}
.app-shell::after{content:"";position:absolute;inset:0;z-index:-1;background:rgba(255,255,255,.16)}
.glass{background:rgba(255,255,255,.90);backdrop-filter:blur(16px)}
header{position:absolute;top:0;left:0;right:0;z-index:40;padding:24px 26px 18px;border-bottom:1px solid rgba(186,230,253,.75)}
.kicker{font-size:.72rem;font-weight:1000;letter-spacing:.12em;color:#f97316;margin-bottom:4px}
h1{font-size:1.9rem;line-height:1.15;margin:0;color:#172033;font-weight:1000} .subtitle{font-size:1rem;color:#64748b;font-weight:900;line-height:1.25;margin-top:8px}
.header-row{display:flex;align-items:flex-end;justify-content:space-between;gap:14px} .tab-row{display:flex;gap:10px;margin-top:18px;overflow-x:auto;padding-bottom:2px}
.tab{border:1px solid #bae6fd;border-radius:24px;background:rgba(255,255,255,.92);color:#0369a1;font-weight:1000;font-size:.92rem;padding:14px 20px;box-shadow:none;white-space:nowrap}
.tab.active{background:#0ea5e9;color:white;border-color:#0ea5e9}
.scroll{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:230px 20px 128px} .scroll::-webkit-scrollbar{width:4px} .scroll::-webkit-scrollbar-thumb{background:#7dd3fc;border-radius:10px}
.card{background:rgba(255,255,255,.91);backdrop-filter:blur(12px);border:2px solid rgba(186,230,253,.78);border-radius:34px;padding:1.05rem;margin-bottom:1rem;box-shadow:0 10px 28px rgba(14,165,233,.12)}
.day-card{background:linear-gradient(135deg,rgba(255,255,255,.94),rgba(240,249,255,.94))}
.item-card{background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-radius:32px;padding:1.05rem;margin-bottom:1rem;border:2px solid rgba(186,230,253,.75);box-shadow:0 8px 22px rgba(15,23,42,.06)}
.item-row{display:flex;gap:15px;align-items:flex-start} .time{color:#f97316;font-size:.94rem;font-weight:1000} .title{font-size:1.35rem;font-weight:1000;line-height:1.35;color:#172033;word-break:break-word}
.note{margin-top:12px;border:1px solid #fde68a;background:#fffbeb;color:#92400e;border-radius:20px;padding:11px 13px;font-weight:900;font-size:.86rem;white-space:pre-line}
.action-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px} .tag,.action{display:inline-flex;align-items:center;gap:5px;border-radius:999px;background:#f0f9ff;border:1px solid #bae6fd;color:#0369a1;padding:6px 12px;font-size:.82rem;font-weight:1000;text-decoration:none}
.action{cursor:pointer} .btn{transition:.16s;box-shadow:0 5px 0 #7dd3fc;border:2px solid #bae6fd} .btn:active{transform:translateY(3px);box-shadow:0 2px 0 #7dd3fc}
footer{position:absolute;bottom:0;left:0;right:0;z-index:40;padding:14px 26px calc(env(safe-area-inset-bottom,0px) + 12px);border-top:1px solid rgba(186,230,253,.75)} .foot-row{display:flex;gap:14px} .foot-btn{flex:1;border-radius:24px;padding:15px 12px;font-size:1rem;font-weight:1000} .prev{background:white;color:#b45309} .next{background:#fb923c;color:white}
.icon-frame{width:52px;height:52px;flex:none;border-radius:18px;background:linear-gradient(135deg,#fff,#e0f7ff);border:2px solid #bae6fd;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 5px 12px rgba(14,165,233,.15)}
.icon-frame img,.mini-icon img{width:100%;height:100%;object-fit:cover;object-position:center;filter:brightness(1.2) saturate(1.18) contrast(.96);transform:scale(1.10);display:block}
.mini-icon{width:64px;height:64px;border-radius:22px;flex:none;background:#f0f9ff;border:2px solid #7dd3fc;overflow:hidden;box-shadow:0 6px 14px rgba(14,165,233,.18)}
.day-nav{display:flex;gap:8px;overflow-x:auto;margin-top:14px;padding-bottom:2px} .day-pill{border:1px solid #bae6fd;border-radius:999px;padding:9px 12px;background:white;color:#0369a1;font-weight:1000;white-space:nowrap} .day-pill.active{background:#0ea5e9;color:white}
.modal-wrap{position:absolute;inset:0;z-index:80;background:rgba(15,23,42,.62);display:flex;align-items:center;justify-content:center;padding:18px} .modal{width:100%;max-height:86%;background:rgba(255,255,255,.97);border-radius:36px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 16px 45px rgba(15,23,42,.28)}
.modal-head{padding:22px 22px 12px;display:flex;justify-content:space-between;gap:12px;align-items:flex-start;border-bottom:1px solid #e0f2fe} .modal-body{padding:16px 22px 22px;overflow-y:auto;-webkit-overflow-scrolling:touch;white-space:pre-line;color:#334155;font-size:1rem;line-height:1.8} .close{width:44px;height:44px;border:0;border-radius:50%;background:#e0f2fe;color:#0369a1;font-weight:1000;font-size:1.2rem}
.welcome-screen{position:fixed;inset:0;z-index:99999;background-image:var(--bg);background-size:cover;background-position:center;display:flex;align-items:flex-end;justify-content:center;padding:24px 20px calc(env(safe-area-inset-bottom,0px) + 32px)}
.welcome-screen::before{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(255,255,255,.04),rgba(0,83,128,.36));} .welcome-card{position:relative;width:100%;max-width:420px;background:rgba(255,255,255,.90);backdrop-filter:blur(14px);border:2px solid rgba(255,255,255,.75);border-radius:34px;padding:24px 20px;text-align:center;box-shadow:0 18px 48px rgba(15,23,42,.25)} .welcome-icon{width:72px;height:72px;margin:0 auto 10px;border-radius:24px;overflow:hidden;border:2px solid #bae6fd;background:white} .welcome-title{font-size:1.9rem;font-weight:1000;color:#172033;line-height:1.15} .welcome-desc{margin-top:9px;color:#64748b;font-weight:900;font-size:.88rem} .welcome-btn{width:100%;margin-top:20px;border:0;border-radius:22px;padding:15px;background:#0ea5e9;color:white;font-size:1rem;font-weight:1000;box-shadow:0 6px 0 #0369a1}
.check{width:30px;height:30px;border-radius:10px;border:2px solid #38bdf8;display:flex;align-items:center;justify-content:center;color:white;font-weight:1000;flex:none} .check.on{background:#0ea5e9} .list-row{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid #e0f2fe}
.money-input,.money-select{border:1px solid #bae6fd;border-radius:18px;padding:12px;background:white;width:100%;font-size:.9rem}
@media(max-width:390px){:root{font-size:18px} header{padding-left:20px;padding-right:20px} .scroll{padding-left:16px;padding-right:16px} h1{font-size:1.65rem} .title{font-size:1.2rem}}
</style>

let state={started:false,day:0,tab:'trip',modal:null,checks:JSON.parse(localStorage.getItem('okinawa_checks')||'{}'),money:JSON.parse(localStorage.getItem('okinawa_money_rows')||'[]'),rate:Number(localStorage.getItem('jpy_rate')||'0.225')};
function iconSrc(key){return ICONS[key]||ICONS.default}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function nl(s){return esc(s).replace(/\n/g,'<br>')}
function saveChecks(){localStorage.setItem('okinawa_checks',JSON.stringify(state.checks))}
function saveMoney(){localStorage.setItem('okinawa_money_rows',JSON.stringify(state.money)); localStorage.setItem('jpy_rate',String(state.rate))}
function render(){document.getElementById('app').innerHTML = state.started ? mainHTML() : welcomeHTML(); bind();}
function welcomeHTML(){return `<div class="welcome-screen"><div class="welcome-card"><div class="welcome-icon"><img src="${iconSrc('ocean')}" style="width:100%;height:100%;object-fit:cover;filter:brightness(1.18) saturate(1.18);transform:scale(1.1)"></div><div class="kicker">OKINAWA FAMILY TRIP</div><div class="welcome-title">2026 沖繩親子旅行</div><div class="welcome-desc">🌺 美麗海水族館・三麗鷗飯店・沖繩自駕 🌺</div><button class="welcome-btn" data-start="1">開始旅程 🐠</button></div></div>`}
function headerHTML(){return `<header class="glass"><div class="kicker">OKINAWA FAMILY TRIP</div><div class="header-row"><div><h1>2026 沖繩親子旅行</h1><div class="subtitle">7/22（三）～ 7/27（一）｜自駕・購物・親子景點</div></div><div class="mini-icon"><img src="${iconSrc('default')}"></div></div><div class="tab-row">${[['trip','行程'],['food','美食'],['list','清單'],['money','記帳']].map(([k,t])=>`<button class="tab ${state.tab===k?'active':''}" data-tab="${k}">${t}</button>`).join('')}</div></header>`}
function mainHTML(){return `${headerHTML()}<main class="scroll">${contentHTML()}</main>${state.tab==='trip'?footerHTML():''}${state.modal!==null?modalHTML():''}`}
function contentHTML(){if(state.tab==='trip')return tripHTML(); if(state.tab==='food')return foodHTML(); if(state.tab==='list')return listHTML(); return moneyHTML();}
function dayIcon(day){return iconSrc(day.items.find(x=>x.icon==='ocean')?'ocean':'default')}
function tripHTML(){const d=ITINERARY[state.day]; return `<section><div class="card day-card"><div class="header-row"><div><div class="time">DAY ${state.day+1}</div><div class="title">${esc(d.title)}</div></div><div class="mini-icon"><img src="${iconSrc('ocean')}"></div></div><div style="margin-top:12px"><a class="tag" href="https://www.google.com/search?q=Naha+Okinawa+weather" target="_blank">☀️ 那霸天氣</a></div><div class="day-nav">${ITINERARY.map((x,i)=>`<button class="day-pill ${i===state.day?'active':''}" data-day="${i}">${esc(x.date)}</button>`).join('')}</div></div>${d.items.map((it,i)=>itemHTML(it,i)).join('')}</section>`}
function itemHTML(it,i){return `<div class="item-card"><div class="item-row"><div class="icon-frame"><img src="${iconSrc(it.icon)}"></div><div style="flex:1;min-width:0"><div class="time">${esc(it.time||'備註')}</div><div class="title">${esc(it.name)}</div>${it.note?`<div class="note">⭐ ${nl(it.note)}</div>`:''}<div class="action-row"><a class="action" href="${esc(it.nav)}" target="_blank">導航</a><button class="action" data-info="${i}">景點介紹</button></div></div></div></div>`}
function modalHTML(){const it=ITINERARY[state.day].items[state.modal]; return `<div class="modal-wrap"><div class="modal"><div class="modal-head"><div style="display:flex;gap:12px"><div class="icon-frame"><img src="${iconSrc(it.icon)}"></div><div><div class="time">${esc(it.time)}</div><div class="title">${esc(it.name)}</div></div></div><button class="close" data-close="1">×</button></div><div class="modal-body">${it.intro?nl(it.intro):'目前 Excel 沒有填寫額外介紹。'}${it.note?`<div class="note" style="margin-top:16px">⭐ ${nl(it.note)}</div>`:''}<div class="action-row" style="margin-top:16px"><a class="action" href="${esc(it.nav)}" target="_blank">打開 Google Maps</a></div></div></div></div>`}
function foodHTML(){return `<section><div class="card"><div class="title">🍽️ 美食備忘錄</div><div class="subtitle">依 Excel「美食」分頁整理。</div></div>${FOOD_LIST.map(f=>`<div class="item-card"><div class="item-row"><div class="icon-frame"><img src="${iconSrc('food')}"></div><div><div class="title">${esc(f.name)}</div><div class="time">${esc(f.food)}</div><div style="font-size:.86rem;color:#64748b;margin-top:6px">${nl([f.hours?('營業：'+f.hours):'',f.note?('備註：'+f.note):'',f.loc].filter(Boolean).join('\n'))}</div><div class="action-row"><a class="action" href="${esc(f.map)}" target="_blank">導航</a></div></div></div></div>`).join('')}</section>`}
function listHTML(){const groups=[['購物重點',SHOPPING_LIST,'shopping'],['停車場備忘',PARKING_LIST,'car']];return `<section>${groups.map(([title,arr,ico])=>`<div class="card"><div class="title">${esc(title)}</div>${arr.map((x,i)=>{let k=title+i;return `<div class="list-row" data-check="${esc(k)}"><div class="check ${state.checks[k]?'on':''}">${state.checks[k]?'✓':''}</div><div><div style="font-weight:1000">${esc(x.name)}</div><div style="font-size:.84rem;color:#64748b;white-space:pre-line">${esc(x.note||x.hours||'')}</div>${x.loc?`<a class="tag" style="margin-top:6px" href="${esc(x.loc)}" target="_blank">導航</a>`:''}</div></div>`}).join('')}</div>`).join('')}</section>`}
function moneyHTML(){let total=state.money.reduce((s,r)=>s+Number(r.amount||0),0);return `<section><div class="card"><div class="title">💰 沖繩記帳</div><div class="note">匯率依台銀外幣現金賣出手動輸入</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px"><input class="money-input" id="m-item" placeholder="支出項目"><select class="money-select" id="m-payer"><option>我</option><option>大姐</option><option>豬豬</option><option>肥</option><option>佩蒂</option></select><select class="money-select" id="m-method"><option>現金</option><option>信用卡</option></select><input class="money-input" id="m-rate" inputmode="decimal" value="${state.rate}" placeholder="匯率"><input class="money-input" id="m-amount" style="grid-column:1/3" inputmode="numeric" placeholder="金額（日圓）"><button class="welcome-btn" style="grid-column:1/3" data-add-money="1">新增支出</button></div></div><div class="card"><div class="time">總支出</div><div class="title">¥ ${total.toLocaleString()}</div><div class="time">≈ NT$ ${Math.round(total*state.rate).toLocaleString()}</div></div>${state.money.map(r=>`<div class="item-card"><div class="header-row"><div><div style="font-weight:1000">${esc(r.item)}</div><div class="action-row"><span class="tag">👤 ${esc(r.payer)}</span><span class="tag">💳 ${esc(r.method)}</span></div></div><div style="text-align:right"><div class="time">¥ ${Number(r.amount).toLocaleString()}</div><div style="font-size:.84rem;color:#64748b">NT$ ${Math.round(Number(r.amount)*state.rate).toLocaleString()}</div></div></div></div>`).join('')}</section>`}
function footerHTML(){return `<footer class="glass"><div class="foot-row"><button class="foot-btn btn prev" data-prev="1">← 上一天</button><button class="foot-btn btn next" data-next="1">下一天 →</button></div></footer>`}
function bind(){document.querySelectorAll('[data-start]').forEach(e=>e.onclick=()=>{state.started=true;render()});document.querySelectorAll('[data-tab]').forEach(e=>e.onclick=()=>{state.tab=e.dataset.tab;render()});document.querySelectorAll('[data-day]').forEach(e=>e.onclick=()=>{state.day=Number(e.dataset.day);render()});document.querySelectorAll('[data-info]').forEach(e=>e.onclick=()=>{state.modal=Number(e.dataset.info);render()});document.querySelectorAll('[data-close]').forEach(e=>e.onclick=()=>{state.modal=null;render()});document.querySelectorAll('[data-prev]').forEach(e=>e.onclick=()=>{state.day=(state.day-1+ITINERARY.length)%ITINERARY.length;render()});document.querySelectorAll('[data-next]').forEach(e=>e.onclick=()=>{state.day=(state.day+1)%ITINERARY.length;render()});document.querySelectorAll('[data-check]').forEach(e=>e.onclick=()=>{const k=e.dataset.check;state.checks[k]=!state.checks[k];saveChecks();render()});document.querySelectorAll('[data-add-money]').forEach(e=>e.onclick=()=>{const item=document.getElementById('m-item').value.trim();const amount=Number(document.getElementById('m-amount').value.replace(/\D/g,''));state.rate=Number(document.getElementById('m-rate').value)||state.rate;if(item&&amount){state.money.push({item,amount,payer:document.getElementById('m-payer').value,method:document.getElementById('m-method').value});saveMoney();render()}})}
render();
</script></body></html>
