body{
  margin:0;
  font-family:'TripFont','Noto Sans TC',system-ui,sans-serif;
  background:#dff6ff;
  color:#1e293b;
  overflow:hidden;
  user-select:none;
  line-height:1.62;
}
.app-outer{
  min-height:100vh;
  display:flex;
  justify-content:center;
  background-image:linear-gradient(rgba(255,255,255,.18),rgba(255,247,237,.32)),var(--okinawa-bg);
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}
@supports(height:100dvh){.app-outer{min-height:100dvh}}
.app-shell{
  width:100%;
  max-width:460px;
  height:100vh;
  background:rgba(255,250,245,.66);
  position:relative;
  overflow:hidden;
  box-shadow:0 0 45px rgba(15,23,42,.12);
  isolation:isolate;
}
.app-shell::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:-2;
  background-image:linear-gradient(rgba(255,255,255,.12),rgba(255,250,245,.36)),var(--okinawa-bg);
  background-size:cover;
  background-position:center top;
}
.app-shell::after{
  content:"";
  position:absolute;
  inset:0;
  z-index:-1;
  background:rgba(255,255,255,.12);
}
@supports(height:100dvh){.app-shell{height:100dvh}}
.glass{background:rgba(255,250,245,.88);backdrop-filter:blur(16px)}
.scroll{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:184px 18px 128px}
.scroll::-webkit-scrollbar{width:4px}.scroll::-webkit-scrollbar-thumb{background:#38bdf8;border-radius:10px}
.card{background:rgba(255,255,255,.90);backdrop-filter:blur(10px);border:2px solid rgba(186,230,253,.78);border-radius:34px;padding:1.05rem;margin-bottom:1rem;box-shadow:0 10px 24px rgba(14,165,233,.10)}
.item-card{background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-radius:30px;padding:1rem;margin-bottom:.9rem;border:1px solid rgba(125,211,252,.70);box-shadow:0 8px 18px rgba(15,23,42,.06)}
.btn{transition:.16s;box-shadow:0 5px 0 #7dd3fc;border:2px solid #bae6fd}
.btn:active{transform:translateY(3px);box-shadow:0 2px 0 #7dd3fc}
.tab{border-radius:999px;padding:.55rem .82rem;font-weight:900;font-size:.78rem;white-space:nowrap}
.tab.active{background:#0ea5e9;color:white}
.tab:not(.active){background:rgba(255,255,255,.90);color:#0369a1;border:1px solid #bae6fd}
.tag{display:inline-flex;align-items:center;gap:4px;border-radius:999px;background:#f0f9ff;border:1px solid #bae6fd;color:#0369a1;padding:3px 9px;font-size:.68rem;font-weight:900}
.check{width:28px;height:28px;border-radius:9px;border:2px solid #38bdf8;display:flex;align-items:center;justify-content:center;color:white;font-weight:900}
.check.on{background:#0ea5e9}
.safe-bottom{padding-bottom:calc(env(safe-area-inset-bottom,0px) + .7rem)}
.modal-wrap{position:absolute;inset:0;z-index:80;background:rgba(15,23,42,.62);display:flex;align-items:center;justify-content:center;padding:16px}
.modal{width:100%;max-height:88%;background:rgba(255,255,255,.96);border-radius:42px;padding:24px;display:flex;flex-direction:column;overflow:hidden}
.modal-body{overflow:auto;padding-right:8px;white-space:pre-line}

.welcome-screen{position:fixed;inset:0;z-index:999999;overflow:hidden;background-image:var(--okinawa-bg);background-size:cover;background-position:center;background-repeat:no-repeat}
.welcome-layer{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;padding:22px 18px calc(env(safe-area-inset-bottom,0px) + 28px);background:linear-gradient(to bottom,rgba(0,0,0,.03) 0%,rgba(0,0,0,.08) 45%,rgba(0,83,128,.42) 100%)}
.welcome-content{width:100%;max-width:420px;background:rgba(255,255,255,.90);backdrop-filter:blur(14px);border:2px solid rgba(255,255,255,.72);border-radius:34px;padding:24px 20px;text-align:center;box-shadow:0 18px 48px rgba(15,23,42,.25)}
.welcome-title-small{font-size:.72rem;font-weight:1000;letter-spacing:.16em;color:#0284c7}
.welcome-title{margin-top:7px;font-size:1.9rem;font-weight:1000;color:#0f172a;line-height:1.15}
.welcome-desc{margin-top:10px;font-size:.86rem;font-weight:850;color:#475569}
.welcome-enter-btn{width:100%;margin-top:20px;border:none;border-radius:22px;padding:15px 18px;background:#0ea5e9;color:white;font-size:1rem;font-weight:1000;box-shadow:0 6px 0 #0369a1}
.welcome-enter-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #0369a1}
.welcome-cinna-icon{width:72px;height:72px;border-radius:24px;object-fit:contain;background:linear-gradient(135deg,#ffffff 0%,#e0f7ff 100%);border:2px solid #bae6fd;box-shadow:0 6px 16px rgba(14,165,233,.18);padding:4px;margin:0 auto 8px}

.cinna-mini{width:58px;height:58px;flex:none;border-radius:20px;background:linear-gradient(135deg,#ffffff 0%,#e0f7ff 100%);border:2px solid #bae6fd;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 6px 14px rgba(14,165,233,.18);padding:3px}
.cinna-mini img{width:100%;height:100%;object-fit:contain;object-position:center;filter:brightness(1.08) saturate(1.1) contrast(.98);display:block}
.cinna-icon-frame{width:50px;height:50px;flex:none;border-radius:18px;background:linear-gradient(135deg,#ffffff 0%,#e0f7ff 100%);border:2px solid #bae6fd;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 5px 12px rgba(14,165,233,.14);padding:3px}
.cinna-icon-frame img{width:100%;height:100%;object-fit:contain;object-position:center;filter:brightness(1.08) saturate(1.1) contrast(.98);display:block}
.header-title{font-size:clamp(1.55rem,7vw,2rem);line-height:1.12}
.header-sub{font-size:clamp(.82rem,4.2vw,1rem)}

function iconData(name){return `data:image/webp;base64,${CINNA_ICONS[name]||CINNA_ICONS.default}`;}
function cinnaIconKey(item){
  const icon=(item&&item.icon)||'';
  if(icon==='🛍️') return 'shopping';
  if(icon==='🍽️'||icon==='🐟') return 'food';
  if(icon==='🚗') return 'car';
  if(icon==='✈️') return 'flight';
  if(icon==='🏨') return 'hotel';
  if(icon==='🐠') return 'ocean';
  if(icon==='⛩️'||icon==='📍') return 'shrine';
  if(icon==='🦁') return 'lion';
  return 'default';
}
const STORAGE_KEY='okinawa_2026_trip_v2';
function loadStore(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch(e){return {}}}
function saveStore(v){localStorage.setItem(STORAGE_KEY,JSON.stringify(v))}
function mapUrl(item){return item.nav || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.mapQuery||item.name+' 沖繩')}`;}
function Weather({cities}){return <div className="flex gap-2 overflow-x-auto pb-1">{cities.map(c=><a key={c.q} className="tag whitespace-nowrap" href={`https://www.google.com/search?q=${encodeURIComponent(c.q+' weather')}`} target="_blank">☀️ {c.n}天氣</a>)}</div>}
function WelcomeScreen({onStart}){return <div className="welcome-screen"><div className="welcome-layer"><div className="welcome-content"><img className="welcome-cinna-icon" src={iconData('ocean')} /><div className="welcome-title-small">OKINAWA FAMILY TRIP</div><div className="welcome-title">2026 沖繩親子旅行</div><div className="welcome-desc">🌺 美麗海水族館・三麗鷗飯店・沖繩自駕 🌺</div><button className="welcome-enter-btn" onClick={onStart}>開始旅程 🐠</button></div></div></div>}
function App(){
  const [started,setStarted]=useState(false);
  const [day,setDay]=useState(0);
  const [tab,setTab]=useState('trip');
  const [modal,setModal]=useState(null);
  const [store,setStore]=useState(loadStore());
  const d=ITINERARY[day];
  useEffect(()=>saveStore(store),[store]);
  const checked=(k)=>!!store[k];
  const toggle=(k)=>setStore(s=>({...s,[k]:!s[k]}));
  if(!started) return <WelcomeScreen onStart={()=>setStarted(true)}/>;
  return <div className="h-full relative">
    <header className="absolute top-0 left-0 right-0 z-40 glass px-5 pt-5 pb-3 border-b border-sky-100">
      <div className="text-xs font-black text-sky-600 tracking-widest">OKINAWA FAMILY TRIP</div>
      <div className="flex items-end justify-between gap-2">
        <div className="min-w-0">
          <h1 className="header-title font-black text-slate-800">2026 沖繩親子旅行</h1>
          <p className="header-sub text-slate-500 font-bold">7/22（三）～ 7/27（一）｜自駕・購物・親子景點</p>
        </div>
        <div className="cinna-mini"><img src={iconData('default')} /></div>
      </div>
      <div className="flex gap-2 mt-3 overflow-x-auto pb-1">
        {['trip','food','list','money'].map((x,i)=><button key={x} onClick={()=>setTab(x)} className={'tab '+(tab===x?'active':'')}>{['行程','美食','清單','記帳'][i]}</button>)}
      </div>
    </header>
    <main className="scroll">
      {tab==='trip'&&<Trip day={d} idx={day} setDay={setDay} setModal={setModal}/>}
      {tab==='food'&&<Food/>}
      {tab==='list'&&<List checked={checked} toggle={toggle}/>}
      {tab==='money'&&<Money/>}
    </main>
    {tab==='trip'&&<footer className="absolute bottom-0 left-0 right-0 z-40 glass safe-bottom px-5 pt-3 border-t border-sky-100"><div className="flex gap-3"><button className="btn flex-1 bg-white rounded-2xl py-3 font-black text-sky-700" onClick={()=>setDay((day-1+ITINERARY.length)%ITINERARY.length)}>← 上一天</button><button className="btn flex-1 bg-orange-400 text-white rounded-2xl py-3 font-black" onClick={()=>setDay((day+1)%ITINERARY.length)}>{day===ITINERARY.length-1?'返回第一天':'下一天 →'}</button></div></footer>}
    {modal&&<Modal item={modal} onClose={()=>setModal(null)}/>}
  </div>
}
function Trip({day,idx,setDay,setModal}){return <section>
  <div className="card bg-gradient-to-br from-sky-50 to-orange-50">
    <div className="flex justify-between items-start gap-3">
      <div><div className="text-sm font-black text-sky-600">DAY {idx+1}</div><h2 className="text-2xl font-black text-slate-800">{day.title}</h2></div>
      <div className="cinna-mini"><img src={iconData('ocean')} /></div>
    </div>
    <div className="mt-3"><Weather cities={day.weatherCities}/></div>
    <div className="flex gap-1 mt-4 overflow-x-auto">{ITINERARY.map((x,i)=><button key={x.date} onClick={()=>setDay(i)} className={'px-3 py-2 rounded-full text-xs font-black whitespace-nowrap '+(i===idx?'bg-sky-500 text-white':'bg-white border border-sky-100 text-sky-700')}>{x.date}</button>)}</div>
  </div>
  {day.items.map((it,i)=><div className="item-card" key={i}><div className="flex gap-3"><div className="cinna-icon-frame"><img src={iconData(cinnaIconKey(it))} /></div><div className="flex-1 min-w-0"><div className="text-xs font-black text-orange-500">{it.time||'備註'}</div><div className="font-black text-lg text-slate-800 break-words">{it.name}</div>{it.highlight&&<div className="mt-2 rounded-2xl bg-amber-50 border border-amber-200 p-2 text-sm font-bold text-amber-800 whitespace-pre-line">⭐ {it.highlight}</div>}<div className="flex gap-2 mt-3 flex-wrap"><button onClick={()=>setModal(it)} className="tag">詳細</button><a className="tag" href={mapUrl(it)} target="_blank">地圖</a></div></div></div></div>)}
</section>}
function Modal({item,onClose}){return <div className="modal-wrap"><div className="modal"><div className="flex justify-between gap-3 mb-3"><div><div className="text-xs text-orange-500 font-black">{item.time}</div><h3 className="text-xl font-black">{item.icon} {item.name}</h3></div><button onClick={onClose} className="w-11 h-11 rounded-full bg-sky-100 text-sky-700 font-black">×</button></div><div className="modal-body text-base text-slate-700">{item.highlight&&<div className="mb-3 bg-amber-50 border border-amber-200 rounded-2xl p-3 font-bold">⭐ {item.highlight}</div>}{item.intro||'目前沒有填寫額外說明，可之後再補。'}</div><a className="btn mt-4 text-center bg-sky-500 text-white rounded-2xl py-3 font-black" href={mapUrl(item)} target="_blank">打開 Google Maps</a></div></div>}
function Food(){return <section><div className="card"><h2 className="text-xl font-black">🍽️ 美食備忘錄</h2><p className="text-sm text-slate-500 font-bold">臨時換餐廳時查。</p></div>{FOOD_LIST.map((f,i)=><div className="item-card" key={i}><div className="flex gap-3"><div className="cinna-icon-frame"><img src={iconData('food')} /></div><div><div className="font-black text-lg">{f.name}</div><div className="text-sm text-orange-600 font-bold">{f.food||''}</div><div className="text-sm mt-1 whitespace-pre-line">{f.hours?'營業：'+f.hours+'\n':''}{f.note?'備註：'+f.note+'\n':''}{f.loc||''}</div>{f.map&&<a className="tag mt-3" href={f.map} target="_blank">地圖</a>}</div></div></div>)}</section>}
function List({checked,toggle}){const groups=[['購物重點',SHOPPING_LIST],['停車場備忘',PARKING_LIST]];return <section>{groups.map(([title,arr])=><div className="card" key={title}><h2 className="text-xl font-black mb-3">{title}</h2>{arr.map((x,i)=>{const key=title+i;return <div className="flex gap-3 py-2 border-b border-sky-50" key={key} onClick={()=>toggle(key)}><div className={'check '+(checked(key)?'on':'')}>{checked(key)?'✓':''}</div><div><div className="font-black">{x.name}</div><div className="text-sm text-slate-500 whitespace-pre-line">{x.note}</div></div></div>})}</div>)}</section>}
function Money(){
  const [rows,setRows]=useState(()=>JSON.parse(localStorage.getItem('okinawa_money_rows')||'[]'));
  const [rate,setRate]=useState(()=>Number(localStorage.getItem('jpy_rate')||'0.225'));
  const [form,setForm]=useState({item:'',payer:'我',method:'現金',amount:''});
  useEffect(()=>localStorage.setItem('okinawa_money_rows',JSON.stringify(rows)),[rows]);
  useEffect(()=>localStorage.setItem('jpy_rate',rate),[rate]);
  const totalJPY=rows.reduce((s,r)=>s+(Number(r.amount)||0),0);
  const totalTWD=Math.round(totalJPY*rate);
  function add(){if(!form.item||!form.amount)return;setRows([...rows,{...form,amount:Number(form.amount)}]);setForm({item:'',payer:'我',method:'現金',amount:''});}
  return <section><div className="card"><h2 className="text-xl font-black">💰 沖繩記帳</h2><div className="mt-4 bg-sky-50 border border-sky-200 rounded-3xl p-4"><div className="text-sm font-black text-sky-700">目前日圓換算匯率（台銀外幣現金賣出）</div><div className="flex gap-2 mt-2 items-center"><input className="border rounded-2xl p-3 flex-1" inputMode="decimal" value={rate} onChange={e=>setRate(Number(e.target.value)||0)}/><div className="font-black text-slate-500">TWD / JPY</div></div></div><div className="grid grid-cols-2 gap-2 mt-4"><input className="border rounded-2xl p-3 col-span-2" placeholder="支出項目" value={form.item} onChange={e=>setForm({...form,item:e.target.value})}/><select className="border rounded-2xl p-3" value={form.payer} onChange={e=>setForm({...form,payer:e.target.value})}>{['我','大姐','豬豬','肥','佩蒂'].map(x=><option key={x}>{x}</option>)}</select><select className="border rounded-2xl p-3" value={form.method} onChange={e=>setForm({...form,method:e.target.value})}><option>現金</option><option>信用卡</option></select><input className="border rounded-2xl p-3 col-span-2" inputMode="numeric" placeholder="金額（日圓）" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value.replace(/\D/g,'')})}/><button onClick={add} className="btn col-span-2 bg-sky-500 text-white rounded-2xl py-3 font-black">新增支出</button></div></div><div className="card bg-gradient-to-br from-sky-50 to-orange-50"><div className="text-sm font-black text-sky-600">總支出</div><div className="text-3xl font-black text-slate-800 mt-1">¥ {totalJPY.toLocaleString()}</div><div className="text-xl font-black text-orange-500 mt-1">≈ NT$ {totalTWD.toLocaleString()}</div></div>{rows.map((r,i)=>{const twd=Math.round(r.amount*rate);return <div className="item-card" key={i}><div className="flex justify-between items-start gap-3"><div><div className="font-black text-lg">{r.item}</div><div className="flex gap-2 mt-2 flex-wrap"><span className="tag">👤 {r.payer}</span><span className="tag">💳 {r.method}</span></div></div><div className="text-right"><div className="font-black text-orange-500 text-lg">¥ {r.amount.toLocaleString()}</div><div className="text-sm font-bold text-slate-500">NT$ {twd.toLocaleString()}</div></div></div></div>})}</section>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
