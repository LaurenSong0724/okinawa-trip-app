body{
  font-family:'TripFont','Noto Sans TC','Microsoft JhengHei',system-ui,sans-serif;
  background:#dff6ff;
  color:#172033;
  overflow:hidden;
  user-select:none;
  line-height:1.6;
}
button,input,select{font-family:inherit}
.app-outer{
  min-height:100vh;
  display:flex;
  justify-content:center;
  background-image:linear-gradient(rgba(255,255,255,.16),rgba(255,247,237,.18)),var(--bg);
  background-size:cover;
  background-position:center;
}
@supports(height:100dvh){.app-outer{min-height:100dvh}}
.app-shell{
  width:100%;
  max-width:460px;
  height:100vh;
  position:relative;
  overflow:hidden;
  background:rgba(255,250,245,.58);
  box-shadow:0 0 45px rgba(15,23,42,.15);
}
@supports(height:100dvh){.app-shell{height:100dvh}}
.app-shell::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:0;
  background-image:linear-gradient(rgba(255,255,255,.02),rgba(255,250,245,.20)),var(--bg);
  background-size:cover;
  background-position:center top;
  opacity:.95;
}
.screen{position:relative;z-index:1;height:100%;}
.glass{background:rgba(255,250,245,.92);backdrop-filter:blur(16px)}
header{
  position:absolute;top:0;left:0;right:0;z-index:40;
  padding:12px 24px 10px;
  border-bottom:1px solid rgba(186,230,253,.75);
}
.kicker{font-size:.8rem;font-weight:1000;color:#f97316;letter-spacing:.13em}
.title-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
h1{font-size:1.86rem;line-height:1.08;margin:.15rem 0 0;font-weight:1000;color:#172033;letter-spacing:.02em}
.subtitle{font-size:.92rem;font-weight:900;color:#64748b;margin-top:.25rem}
.tabs{display:flex;gap:12px;margin-top:12px}
.tab{border:1px solid #bae6fd;border-radius:999px;padding:11px 20px;background:white;color:#0369a1;font-weight:1000;font-size:.96rem}
.tab.active{background:#0ea5e9;color:white;border-color:#0ea5e9}
.scroll{
  height:100%;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:235px 22px 128px;
}
.scroll::-webkit-scrollbar{width:4px} .scroll::-webkit-scrollbar-thumb{background:#7dd3fc;border-radius:10px}
.card{
  background:rgba(255,255,255,.91);
  backdrop-filter:blur(10px);
  border:2px solid rgba(186,230,253,.84);
  border-radius:34px;
  padding:1.05rem;
  margin-bottom:1rem;
  box-shadow:0 10px 26px rgba(14,165,233,.11);
}
.day-card{background:linear-gradient(135deg,rgba(255,255,255,.94),rgba(240,249,255,.90))}
.day-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.day-label{font-size:.78rem;font-weight:1000;color:#0284c7;letter-spacing:.08em}
.day-title{font-size:1.35rem;font-weight:1000;color:#172033;line-height:1.2;margin-top:.15rem}
.day-note{margin-top:.75rem;padding:.55rem .75rem;border-radius:18px;background:#fff7ed;border:1px solid #fed7aa;font-size:.82rem;font-weight:900;color:#9a3412;white-space:pre-line}
.day-nav{display:flex;gap:8px;overflow-x:auto;margin-top:14px;padding-bottom:2px}
.day-pill{border:1px solid #bae6fd;border-radius:999px;padding:9px 12px;background:white;color:#0369a1;font-weight:1000;white-space:nowrap}
.day-pill.active{background:#0ea5e9;color:white}
.item-card{
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(10px);
  border:1.6px solid rgba(186,230,253,.88);
  border-radius:32px;
  padding:1rem;
  margin-bottom:.9rem;
  box-shadow:0 8px 20px rgba(15,23,42,.06);
}
.item-row{display:flex;gap:14px;align-items:flex-start}
.icon-frame{
  width:52px;height:52px;flex:none;border-radius:18px;
  background:linear-gradient(135deg,#fff,#e0f7ff);
  border:2px solid #bae6fd;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  box-shadow:0 5px 12px rgba(14,165,233,.15);
}
.icon-frame img,.mini-icon img,.welcome-icon img{
  width:100%;height:100%;object-fit:cover;object-position:center;

const ITINERARY=[{"date": "7月22日(三)", "title": "7月22日(三) 沖繩行程", "dayNote": "", "items": [{"time": "07:00", "name": "出發前往台中清泉崗機場", "intro": "各自乘坐UBER過去，因為交流道下來那裡會塞車，建議早點出門", "note": "", "nav": "https://maps.app.goo.gl/vsnDYM284t1UXRjv8", "icon": "car"}, {"time": "10:00-12:40", "name": "出發前往日本沖繩", "intro": "乘坐華航CI310出發前往日本沖繩", "note": "", "nav": "", "icon": "flight"}, {"time": "12:40-13:30", "name": "那霸機場入境後坐機場接送到OTS", "intro": "-到達那霸機場領取行李入境後，向右走(國內線方向)，走到盡頭看到手扶梯\n-搭乘手扶梯上二樓後左轉，再右轉進到長廊然後直走\n-搭乘手扶梯下到國內線1樓，並前往4號出口\n-4號出口出來後穿過人行道，「10-A（R-10）」接駁站在左側", "note": "", "nav": "", "icon": "car"}, {"time": "14:00", "name": "OTS臨空豐崎營業所租車", "intro": "-每10~20分鐘發車一班，路程約10~15分鐘\n-Suzuki Solio Hybrid\n-39050日圓，現場付款", "note": "", "nav": "https://maps.app.goo.gl/ZwNGbSp6ZQdcQ21A9", "icon": "car"}, {"time": "14:30-15:00", "name": "波上宮", "intro": "波上宮是沖繩那霸最具代表性的神社，也是「琉球八社」之首\n建於珊瑚礁懸崖上，擁有沖繩傳統紅瓦屋頂，俯瞰著碧藍的「波之上海灘」\n自古以來被視為守護海上安全、漁獲豐收與心靈平靜的神聖之地\n-供奉神明： 熊野三神(伊弉冊尊、速玉男尊、事解男尊)\n-主要祈求結緣、安產、除厄與旅行平安\n-特色御守： 小書包交通御守、貝殼結緣御守\n-最佳拍照點： 沿著神社後方的「波之上臨港道路」，可以捕捉到波上宮矗立在崖上的絕美全景", "note": "宮前的停車場限停30分鐘\n若想待久可以停若狹海濱公園停車場(Wakasa Seaside Park Parking Lot)", "nav": "https://maps.app.goo.gl/ZERwCS3ZKrmutkbF6", "icon": "shrine"}, {"time": "15:30-16:30", "name": "首里城", "intro": "首里城是琉球王國最高權力與文化的象徵，融合了中國與日本的建築風格，朱紅色外牆、華麗的龍柱以及飛簷屋脊，展現出獨特的琉球美學\n正殿不僅是國王處理政務的地方，也是舉行重大典禮、接待冊封使的重要場域，被列為世界文化遺產「琉球王國的城堡以及相關遺產群」的一部分\n免付費：守禮門、園比屋武御嶽石門、歡會門、瑞泉門、漏刻門及廣福門", "note": "", "nav": "https://maps.app.goo.gl/J3XYtXkPhy1mP29D8", "icon": "shrine"}, {"time": "17:00-17:30", "name": "首里西來院達摩寺", "intro": "首里西來院達摩寺是位於沖繩那霸市首里城附近的一座臨濟宗妙心寺派寺院\n寺院內外擺放著大大小小、表情各異的達摩不倒翁，是求事業、轉職、創業與考試突破的熱門參拜點\n寺院內設有一座縮小版的千本鳥居步道，是非常熱門的拍照打卡點\n供奉神明：包含祈求好姻緣的「良緣地藏」、斬斷惡緣的「緣切不動明王」、主管智慧且保佑考試及格的「文殊菩薩」，以及庇佑商業繁盛的「稻荷大神」與可愛的狐狸使者\n特色御守：透明壓克力達摩御守、 提升財運與事業運的金運守、安產守、子育守、交通安全守，還能購買到波上宮也有的小書包御守、七福神、十德籤以及多款串珠御守", "note": "可導航至西來院，寺廟對面設有免費停車場（約4-6個車位），因巷弄較窄，行車需放慢速度", "nav": "https://maps.app.goo.gl/2y4FBDDByY6hHKaU6", "icon": "shrine"}, {"time": "18:00-18:30", "name": "三麗鷗飯店check in放行李", "intro": "沖繩唯一一間三麗鷗主題風格酒店，一出門就是國際通", "note": "因無特約停車場，需停在收費停車場後步行去飯店\n停車場資訊看下面", "nav": "https://maps.app.goo.gl/Q1SqEwfJn6vDR59S8", "icon": "hotel"}, {"time": "18:30-", "name": "國際通商店街購物、晚餐", "intro": "美麗海直營店：是水族館唯一的官方直營商店\n必買人氣商品↓\n千圓抽獎活動：店內超人氣的 ¥1000 抽獎，抽抽有獎，保底能帶走一隻可愛的鯨鯊娃娃\n生日泳圈鯨鯊系列：可自由選擇月份鯨鯊與日期泳圈進行組合，非常具備紀念意義的熱門伴手禮\n沖繩限定販售：有著鯨鯊圖案的鋁罐蘇打\n海洋明星絨毛玩偶/背包：經典的鯨鯊、海龜、花園鰻等造型娃娃，款式齊全\n水族館限定扭蛋：一顆約 ¥500，做工精緻，包含海牛、魟魚等造型，深受遊客喜愛\n生活實用小物：如海洋生物造型的兒童餐盤、筷架、文具及吊飾等\n\nBic Camera Select 那霸國際通店：是沖繩首間大型直營店，店內除了熱門的美容家電與相機，也特別規劃沖繩主題伴手禮專區\n\n札幌藥妝 沖繩國際通店：源自日本北海道的知名藥妝連鎖品牌，以豐富的醫藥品、美妝保養、母嬰用品與北海道獨家伴手禮聞名\n必買推薦清單沖繩限定保養品： 沖繩限定版 Lululun 面膜\n沖繩特色零食： Calbee 沖繩香檬口味洋芋片、BOURBON 紅芋夾心威化餅、沖繩限定口味嗨啾 (HI-CHEW)\n札幌藥妝獨家保健品： Wellness Navi 系列產品（如防宿醉的 NO-MO、舒壓的 GABAX 等）\n經典人氣藥妝： 合利他命強效錠、PAIR ACNE 痘痘膏、參天 FX NEO 清涼眼藥水、大正漢方胃腸藥等等\n\nCalbee+沖繩國際通店：除了販售洋芋片零食之外，還有各式店內現做美食。透過透明玻璃可以直接看到食物在開放式廚房內製作的過程\n必點現炸：紅芋薯條、經典薯條、黑糖口味馬鈴薯吉拿棒\n必買的兩款：「黑糖美麗薯塊」及「海苔鹽薯塊」，也是店內的明星產品，機場免稅店買不到的\n\n首里石鹼 國際通松尾店：源自日本沖繩的超人氣天然植物保養品牌，由職人手工打造出富含南國香氛與保濕成分的潔顏皂、護手霜與各式護膚品\n\n塩の専門店 塩屋 國際通店：專售獲世界紀錄認證的「雪鹽」，可以品嚐各種特色鹽味冰淇淋，並嘗試撒上柚子鹽、抹茶鹽等創意吃法\n\n南星莎布翁（SuiSavon）：沙翁(沖繩傳統小吃)\n\nはちよん シーサー焼き：風獅爺燒(推薦紅薯口味)\n\n文化屋雜貨店：OKINAWA文化屋雜貨店是沖繩國際通上規模最大、裝潢最浮誇的指標性特產店，主打「一站式購足」沖繩限定動漫周邊與在地伴手禮\n推薦必買：沖繩限定曬黑娃娃(限定版吉伊卡哇)、Orion 啤酒聯名 T-Shirt、沖繩風獅爺手工藝品、紅芋與黑糖特產點心、泡盛酒與香檬風味飲品\n\n唐吉訶德 國際通店：沖繩那霸市中心唯一 24 小時營業、規模最大的獨棟綜合型折扣店，主打以超低折扣「一站式」打包全日本熱銷藥妝、沖繩在地限定伴手禮與生活雜貨\n推薦必買：沖繩限定口味零食(紅芋口味 KitKat、沖繩島辣椒柿之種、香檬洋芋片)、石垣島辣油、宮古島雪鹽", "note": "", "nav": "https://maps.app.goo.gl/de1YywpzAeDsgZyH7", "icon": "shopping"}]}, {"date": "7月23日(四)", "title": "7月23日(四) 沖繩行程", "dayNote": "11:00出門", "items": [{"time": "11:00", "name": "三麗鷗飯店check out", "intro": "", "note": "", "nav": "", "icon": "hotel"}, {"time": "11:05-12:20", "name": "麥當勞姬百合通壺屋店", "intro": "沖繩唯一一間「白色麥當勞」，為了融合當地的壺屋燒陶藝文化，外觀採用極簡白與傳統紅磚設計，店頂甚至設有沖繩守護神「風獅爺」，是社群上非常熱門的打卡景點", "note": "", "nav": "https://maps.app.goo.gl/vdZnfvUhCFt9t54b6", "icon": "food"}, {"time": "13:00-16:00", "name": "沖繩兒童王國", "intro": "沖繩兒童王國為沖繩縣內唯一的動物園，除了能與動物們近距離接觸之外，其特色就是飼育著沖繩特有的動物，並結合了科學遊樂設施與博物館，非常適合親子同遊", "note": ": [{"time": "09:00-10:00", "name": "許田休息站", "intro": "買小吃、刮刮樂", "note": "", "nav": "https://maps.app.goo.gl/bFHk16YYQrtNmaeK9", "icon": "food"}, {"time": "10:30-11:00", "name": "星巴克 名護21世紀之森公園", "intro": "海景星巴克", "note": "", "nav": "https://maps.app.goo.gl/jzaqoxrgujeYJNfk9", "icon": "food"}, {"time": "11:30-12:00", "name": "Shinmei Coffee", "intro": "現刨黑糖拿鐵", "note": "", "nav": "https://maps.app.goo.gl/v5iW7dBZ1yUzn8Kq8", "icon": "food"}, {"time": "12:30-13:30", "name": "CAMEL SANDWICH & SMOOTHIE", "intro": "午餐三明治", "note": "", "nav": "https://maps.app.goo.gl/6LodUBJthUXu1xPbA", "icon": "food"}, {"time": "14:00-18:30", "name": "沖繩美麗海水族館", "intro": "-15:00/17:00鯨鯊餵食、海豚秀\n-位於中央北部售票區、P7停車場附近的「山原之杜商店」抽鯨鯊娃娃(一次1000日圓)\n-水族館內的「Blue Manta」紀念品店買「透明壓克力御守」包含鯨鯊、花園鰻等經典海洋生物款式", "note": "建議停P7停車場", "nav": "https://maps.app.goo.gl/4Qaiv959sjmozXan9", "icon": "ocean"}, {"time": "19:15", "name": "晚餐松の古民家", "intro": "由具有70年歷史的傳統沖繩民宅改建而成，主要供應沖繩在地黑毛豬「阿古豬」（Agu豬）涮涮鍋與多樣沖繩鄉土料理，是融合懷舊氛圍與在地美食的絕佳去處", "note": "", "nav": "https://maps.app.goo.gl/gtptkg32Vxua3r7i8", "icon": "food"}]}, {"date": "7月26日(日)", "title": "7月26日(日) 沖繩行程", "dayNote": "09:30出門", "items": [{"time": "09:30-11:15", "name": "泊港漁市場", "intro": "當地規模最大的海鮮批發集散地，產地直送的新鮮鮪魚、乾淨舒適的室內空間、種類豐富的即食海鮮供遊客大快朵頤\n-坂下水産株式会社 (生蠔、烤龍蝦、烤扇貝)\n-かねい沖縄 (燒烤壺章魚)\n-茂水産 (鮪魚腹肉握壽司)\n-丼すし まぐろ屋本舗 (丼飯)\n-まぐろ大吉 (各種握壽司)\n-大國海產、中真水產 (全包)", "note": "", "nav": "https://maps.app.goo.gl/tZrxjrgqP8kew5pX7", "icon": "food"}, {"time": "11:20", "name": "送佩蒂去那霸機場", "intro": "班機是13:40，約11:40抵達", "note": "可臨停下客/停P1、P2 或P3立體停車場，前30分免費", "nav": "https://maps.app.goo.gl/PVgFiCk8jkHEqPzy8", "icon": "flight"}, {"time": "12:40-14:40", "name": "DMM Kariyushi水族館", "intro": "在iiAs 沖繩豐崎2F", "note": "", "nav": "https://maps.app.goo.gl/n9dmLwyQprupVYkW9", "icon": "ocean"}, {"time": "15:00-17:00", "name": "iiAs 沖繩豐崎購物", "intro": "iias 沖繩豐崎 (イーアス沖縄豊崎) 是位於沖繩南部的複合式度假購物商城。 於 2020 年開幕，兼具海景、購物、美食、娛樂等多功能，是沖繩最具代表性的休閒購物勝地\n-購物：GU、UNIQLO\n-2樓tete by okinawa有琉球透明壓克力御守\n-3樓有三麗鷗角色祭", "note": "", "nav" function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function nl(s){return esc(s).replace(/\n/g,'<br>');}
function iconSrc(k){return ICONS[k] || ICONS.default;}
function tripCountdown(){
  const target=new Date('2026-07-22T00:00:00+08:00');
  const now=new Date();
  const diff=Math.ceil((target-now)/(1000*60*60*24));
  if(diff>0) return `還有 ${diff} 天`;
  if(diff===0) return '今天出發！';
  return '旅程已開始';
}
function saveState(){
  localStorage.setItem('okinawa_day', String(state.day));
  localStorage.setItem('okinawa_tab', state.tab);
  localStorage.setItem('okinawa_bag', state.bag);
  localStorage.setItem('okinawa_person', state.person);
  localStorage.setItem('okinawa_souvenir_person', state.souvenirPerson);
}
function getScrollKey(){
  return 'okinawa_scroll_' + state.tab + '_' + state.day;
}
function rememberScroll(){
  const sc=document.querySelector('.scroll');
  if(sc) localStorage.setItem(getScrollKey(), String(sc.scrollTop));
}
function setScrollStable(v){
  const sc=document.querySelector('.scroll');
  if(!sc) return;
  sc.scrollTop=v;
  requestAnimationFrame(()=>{ sc.scrollTop=v; requestAnimationFrame(()=>{ sc.scrollTop=v; }); });
  setTimeout(()=>{ const s=document.querySelector('.scroll'); if(s) s.scrollTop=v; }, 80);
}
function restoreScroll(){
  const sc=document.querySelector('.scroll');
  if(sc) {
    const v=Number(localStorage.getItem(getScrollKey()) || sessionStorage.getItem('okinawa_last_scroll') || 0);
    setScrollStable(v);
  }
}
function currentScrollTop(){
  const sc=document.querySelector('.scroll');
  return sc ? sc.scrollTop : 0;
}
function showModal(){
  const host=document.getElementById('modal-root');
  if(!host) return;
  host.innerHTML=modalHTML();
  host.querySelector('[data-close]')?.addEventListener('click', closeModal);
  host.querySelector('[data-modal-bg]')?.addEventListener('click', e=>{ if(e.target.dataset.modalBg) closeModal(); });
}
function closeModal(){
  const keep=Number(sessionStorage.getItem('okinawa_last_scroll') || currentScrollTop());
  state.modal=null;
  const host=document.getElementById('modal-root');
  if(host) host.innerHTML='';
  setScrollStable(keep);
}

function packingPercent(person){
  const rows=packingItems.filter(x=>x.person===person);
  if(!rows.length) return {done:0,total:0,pct:0};
  const done=rows.filter(x=>x.checked).length;
  return {done,total:rows.length,pct:Math.round(done*100/rows.length)};
}
function sortedRows(rows){
  return [...rows].sort((a,b)=>Number(a.checked)-Number(b.checked) || String(a.created_at||'').localeCompare(String(b.created_at||'')));
}

function ensureSupabase(){
  if(sb) return true;
  if(!window.supabase || !window.supabase.createClient){packingStatus='Supabase 載入失敗'; return false;}
  sb=window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  return true;
}
async function loadPacking(){
  if(!ensureSupabase()) { render(true); return; }
  packingStatus='同步中';
  try{
    const [p,s]=await Promise.all([
      sb.from('packing_items').select('*').order('created_at',{ascending:true}),
      sb.from('shared_items').select('*').order('created_at',{ascending:true})
    ]);
    if(p.error) throw p.error;
    if(s.error) throw s.error;
    packingItems=p.data||[];
    sharedItems=s.data||[];
    packingStatus='已同步';
  }catch(err){
    console.error(err);
    packingStatus='同步失敗';
  }
  if(state.started && state.tab==='packing') render(true);
}
function initPackingSync(){
  if(packingStarted || !ensureSupabase()) return;
  packingStarted=true;
  loadPacking();
  try{
    sb.channel('okinawa-packing-sync')
      .on('postgres_changes',{event:'*',schema:'public',table:'packing_items'},()=>loadPacking())
      .on('postgres_changes',{event:'*',schema:'public',table:'shared_items'},()=>loadPacking())
      .subscribe(status=>{ if(status==='SUBSCRIBED'){packingStatus='已連線'; if(state.started && state.tab==='packing') render(true);} });
  }catch(err){console.error(err); packingStatus='即時同步失敗';}
}
async function addPackingItem(person){
  const input=document.querySelector(`[data-add-input="${CSS.escape(person)}"]`);
  const item=(input?.value||'').trim();

  if(!ensureSupabase()) return alert('Supabase 尚未連線');
  input.value='';
  const {error}=await sb.from('packing_items').insert({person, bag_type:state.bag, item, checked:false});
  if(error) alert('新增失敗：'+error.message); else loadPacking();
}

async function toggleShared(id){

async function deleteShared(id){

function initSouvenirSync(){

      .on('postgres_changes',{event:'*',schema:'public',table:'souvenir_items'},()=>loadSouvenirs())
      .subscribe();
  }catch(err){console.error(err);}
}
async function compressImage(file){
  if(!file) return null;
  if(!file.type.startsWith('image/')) throw new Error('請選擇圖片檔');
  const bitmap=await createImageBitmap(file);
  const max=1280;
  const scale=Math.min(1,max/Math.max(bitmap.width,bitmap.height));
  const w=Math.max(1,Math.round(bitmap.width*scale));
  const h=Math.max(1,Math.round(bitmap.height*scale));
  const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
  canvas.getContext('2d').drawImage(bitmap,0,0,w,h);
  bitmap.close?.();
  return await new Promise((resolve,reject)=>canvas.toBlob(b=>b?resolve(b):reject(new Error('圖片壓縮失敗')),'image/webp',0.82));
}
async function uploadSouvenirImage(file,person){
  if(!file) return {url:'',path:''};
  const blob=await compressImage(file);
  const safe=String(person).replace(/[^\w\u4e00-\u9fff-]/g,'_');
  const path=`${safe}/${Date.now()}-${crypto.randomUUID?.()||Math.random().toString(36).slice(2)}.webp`;
  const {error}=await sb.storage.from('souvenir-images').upload(path,blob,{contentType:'image/webp',upsert:false});
  if(error) throw error;
  const {data}=sb.storage.from('souvenir-images').getPublicUrl(path);
  return {url:data.publicUrl,path};
}
async function addSouvenir(){
  const form=document.querySelector('[data-souvenir-form]');
  const name=(form?.querySelector('[data-souvenir-name]')?.value||'').trim();
  const note=(form?.querySelector('[data-souvenir-note]')?.value||'').trim();
  const file=form?.querySelector('[data-souvenir-file]')?.files?.[0]||null;
  if(!name) return alert('請輸入商品名稱');
  if(!ensureSupabase()) return alert('Supabase 尚未連線');
  form.classList.add('souvenir-uploading');
  try{
    const img=await uploadSouvenirImage(file,state.souvenirPerson);
    const {error}=await sb.from('souvenir_items').insert({person:state.souvenirPerson,item:name,note,image_url:img.url,image_path:img.path,purchased:false});
    if(error){if(img.path) await sb.storage.from('souvenir-images').remove([img.path]);throw error;}
    await loadSouvenirs();
  }catch(err){console.error(err);alert('新增失敗：'+err.message);}
  finally{form.classList.remove('souvenir-uploading');}
}
async function toggleSouvenir(id){

async function deleteSouvenir(id){

  loadSouvenirs();
}
async function editSouvenir(id){

  const item=prompt('修改商品名稱',row.item||''); if(item===null||!item.trim()) return;
  const note=prompt('修改備註（可留空）',row.note||''); if(note===null) return;
  const {error}=await sb.from('souvenir_items').update({item:item.trim(),note:note.trim(),updated_at:new Date().toISOString()}).eq('id',id);

function appHTML(){
  return headerHTML() + (state.tab==='packing' ? packingHTML() : (state.tab==='souvenir' ? souvenirHTML() : (state.tab==='tax' ? taxHTML() : dayHTML())));
}
function render(keepScroll=true){
  const before=document.querySelector('.scroll');
  const oldTop=before ? before.scrollTop : null;
  document.getElementById('app').innerHTML = state.started ? appHTML() : welcomeHTML();
  const host=document.getElementById('modal-root');
  if(host && state.modal===null) host.innerHTML='';
  bind();
  const after=document.querySelector('.scroll');
  if(after){
    after.addEventListener('scroll', ()=>{window.clearTimeout(after._t); after._t=window.setTimeout(rememberScroll,80);}, {passive:true});
    if(keepScroll && oldTop!==null) setScrollStable(oldTop);
    else restoreScroll();
  }
}
function bind(){
  document.querySelector('[data-start]')?.addEventListener('click',()=>{state.started=true;sessionStorage.setItem('okinawa_started','yes');render(false);});
  document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>{rememberScroll();state.tab=b.dataset.tab;saveState();if(state.tab==='packing') initPackingSync();if(state.tab==='souvenir') initSouvenirSync();render(false);}));
  document.querySelectorAll('[data-bag]').forEach(b=>b.addEventListener('click',()=>{rememberScroll();state.bag=b.dataset.bag;saveState();render(false);}));
  document.querySelectorAll('[data-person]').forEach(b=>b.addEventListener('click',()=>{rememberScroll();state.person=b.dataset.person;saveState();render(false);}));
  document.querySelectorAll('[data-souvenir-person]').forEach(b=>b.addEventListener('click',()=>{rememberScroll();state.souvenirPerson=b.dataset.souvenirPerson;saveState();render(false);}));
  document.querySelectorAll('[data-day]').forEach(b=>b.addEventListener('click',()=>{rememberScroll();state.day=Number(b.dataset.day);saveState();render(false);}));
  document.querySelector('[data-prev]')?.addEventListener('click',()=>{rememberScroll();state.day=(state.day-1+ITINERARY.length)%ITINERARY.length;saveState();render(false);});
  document.querySelector('[data-next]')?.addEventListener('click',()=>{rememberScroll();state.day=(state.day+1)%ITINERARY.length;saveState();render(false);});
  document.querySelectorAll('[data-info]').forEach(b=>b.addEventListener('click',()=>{rememberScroll();sessionStorage.setItem('okinawa_last_scroll', String(currentScrollTop()));state.modal=Number(b.dataset.info);showModal();}));
  document.querySelectorAll('[data-add-person]').forEach(b=>b.addEventListener('click',()=>addPackingItem(b.dataset.addPerson)));
  document.querySelectorAll('[data-add-input]').forEach(i=>i.addEventListener('keydown',e=>{if(e.key==='Enter') addPackingItem(i.dataset.addInput);}));
  document.querySelectorAll('[data-packing-check]').forEach(b=>b.addEventListener('click',()=>togglePacking(b.dataset.packingCheck)));
  document.querySelectorAll('[data-packing-delete]').forEach(b=>b.addEventListener('click',()=>deletePacking(b.dataset.packingDelete)));
  document.querySelectorAll('[data-packing-edit]').forEach(b=>b.addEventListener('click',()=>editPacking(b.dataset.packingEdit)));
  document.querySelector('[data-shared-add]')?.addEventListener('click',addSharedItem);
  document.querySelector('[data-shared-item]')?.addEventListener('keydown',e=>{if(e.key==='Enter') addSharedItem();});
  document.querySelectorAll('[data-shared-check]').forEach(b=>b.addEventListener('click',()=>toggleShared(b.dataset.sharedCheck)));
  document.querySelectorAll('[data-shared-delete]').forEach(b=>b.addEventListener('click',()=>deleteShared(b.dataset.sharedDelete)));
  document.querySelectorAll('[data-shared-edit]').forEach(b=>b.addEventListener('click',()=>editShared(b.dataset.sharedEdit)));
  document.querySelector('[data-souvenir-file]')?.addEventListener('change',e=>{const f=e.target.files?.[0];const img=document.querySelector('[data-souvenir-preview]');if(!img)return;if(f){img.src=URL.createObjectURL(f);img.style.display='block';}else{img.removeAttribute('src');img.style.display='none';}});
  document.querySelector('[data-souvenir-add]')?.addEventListener('click',addSouvenir);
  document.querySelectorAll('[data-souvenir-toggle]').forEach(b=>b.addEventListener('click',()=>toggleSouvenir(b.dataset.souvenirToggle)));
  document.querySelectorAll('[data-souvenir-delete]').forEach(b=>b.addEventListener('click',()=>deleteSouvenir(b.dataset.souvenirDelete)));
  document.querySelectorAll('[data-souvenir-edit]').forEach(b=>b.addEventListener('click',()=>editSouvenir(b.dataset.souvenirEdit)));
  document.querySelectorAll('a.tag-btn').forEach(a=>a.addEventListener('click',()=>{rememberScroll();sessionStorage.setItem('okinawa_last_scroll', String(currentScrollTop()));}));
}

window.addEventListener('pagehide', ()=>{rememberScroll();sessionStorage.setItem('okinawa_last_scroll', String(currentScrollTop()));});
window.addEventListener('visibilitychange', ()=>{if(document.hidden){rememberScroll();sessionStorage.setItem('okinawa_last_scroll', String(currentScrollTop()));}});
window.addEventListener('pageshow', ()=>{setTimeout(restoreScroll, 60);});
initPackingSync();
if(state.tab==='souvenir') initSouvenirSync();
render(false);
</script>
