const PARKING_LIST = [{"name": "コーラルパーキング安里", "hours": "三麗鷗飯店旁", "loc": "https://maps.app.goo.gl/oKsK8VsncYzJLF4Q9", "note": "每40分200，最高12小時800日圓", "kind": "spot"}, {"name": "ザ・パーク 安里1丁目", "hours": "↑再進去", "loc": "https://maps.app.goo.gl/M2Z5gfNEqVNpVwrU6", "note": "每60分200，07-19時最高700、19-07最高500日圓", "kind": "spot"}, {"name": "ブレイク×ザ・パーク安里", "hours": "↑再進去", "loc": "https://maps.app.goo.gl/brwTGjbRXQzwhEBA7", "note": "每30分200，最高12小時900日圓", "kind": "spot"}, {"name": "テクニカルパーク安里第1", "hours": "三麗鷗再過一個路口後松本清對面", "loc": "https://maps.app.goo.gl/HiueKyNu9R159n1f8", "note": "最初90分300，之後每30分100，最高12小時700日圓", "kind": "spot"}, {"name": "Dパーキング 那覇市安里一丁目第一", "hours": "↑停車場對面路進去", "loc": "https://maps.app.goo.gl/1goo6FCHoR8tEzVUA", "note": "最初60分400，之後每30分300，最高24小時1800日圓", "kind": "spot"}, {"name": "テクニカルパーク牧志第3", "hours": "一蘭拉麵後方", "loc": "https://maps.app.goo.gl/xA57ZVhR8q9zxJKu5", "note": "每25分100，最高12小時700日圓", "kind": "spot"}, {"name": "アップルパーク牧志1丁目第2", "hours": "與↑在同條路", "loc": "https://maps.app.goo.gl/m4zqauyq2M33B6kQ8", "note": "每30分100，最高12小時800日圓", "kind": "spot"}, {"name": "テクニカルパーク牧志第1", "hours": "與↑在同條路", "loc": "https://maps.app.goo.gl/wbn8shdtWwu3STss5", "note": "每30分100，最高12小時800日圓", "kind": "spot"}, {"name": "エコロパーク 国際通り第1", "hours": null, "loc": "https://maps.app.goo.gl/iKYfiX58tQ5FoJRQA", "note": "每30分300，最高12小時800日圓", "kind": "spot"}, {"name": "ブレイクパーキング国際通り第2", "hours": null, "loc": "https://maps.app.goo.gl/vUjunZTFC8SMEvs78", "note": "每30分300，最高12小時800日圓", "kind": "spot"}, {"name": "テクニカルパーク 松尾第1", "hours": null, "loc": "https://maps.app.goo.gl/xyRnMbqFKQdvPsaLA", "note": "每22分100，最高12小時900日圓", "kind": "spot"}, {"name": "アップルパーク松尾2丁目第1", "hours": null, "loc": "https://maps.app.goo.gl/amBgrCX3MHffTmvH7", "note": "每15分100，最高24小時1000日圓", "kind": "spot"}];
const STORAGE_KEY='okinawa_2026_trip_v1';
function loadStore(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch(e){return {}}}
function saveStore(v){localStorage.setItem(STORAGE_KEY,JSON.stringify(v))}
function mapUrl(item){return item.nav || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.mapQuery||item.name+' 沖繩')}`}
function Weather({cities}){return <div className="flex gap-2 overflow-x-auto pb-1">{cities.map(c=><a key={c.q} className="tag whitespace-nowrap" href={`https://www.google.com/search?q=${encodeURIComponent(c.q+' weather')}`} target="_blank">☀️ {c.n}天氣</a>)}</div>}
function App(){const [day,setDay]=useState(0);const [tab,setTab]=useState('trip');const [modal,setModal]=useState(null);const [store,setStore]=useState(loadStore());const d=ITINERARY[day];useEffect(()=>saveStore(store),[store]);const checked=(k)=>!!store[k];const toggle=(k)=>setStore(s=>({...s,[k]:!s[k]}));return <div className="h-full relative">
  <header className="absolute top-0 left-0 right-0 z-40 glass px-5 pt-5 pb-3 border-b border-orange-100">
    <div className="text-xs font-black text-orange-500 tracking-widest">OKINAWA FAMILY TRIP</div>
    <div className="flex items-end justify-between gap-2"><div><h1 className="text-2xl font-black text-slate-800 leading-tight">2026 沖繩親子旅行</h1><p className="text-sm text-slate-500 font-bold">7/22（三）～ 7/27（一）｜自駕・購物・親子景點</p></div><div className="text-4xl">🌺</div></div>
    <div className="flex gap-2 mt-3"><button onClick={()=>setTab('trip')} className={'tab '+(tab==='trip'?'active':'')}>行程</button><button onClick={()=>setTab('food')} className={'tab '+(tab==='food'?'active':'')}>美食</button><button onClick={()=>setTab('list')} className={'tab '+(tab==='list'?'active':'')}>清單</button><button onClick={()=>setTab('money')} className={'tab '+(tab==='money'?'active':'')}>記帳</button></div>
  </header>
  <main className="scroll">
    {tab==='trip'&&<Trip day={d} idx={day} setDay={setDay} setModal={setModal}/>} 
    {tab==='food'&&<Food/>}
    {tab==='list'&&<List checked={checked} toggle={toggle}/>} 
    {tab==='money'&&<Money/>}
  </main>
  {tab==='trip'&&<footer className="absolute bottom-0 left-0 right-0 z-40 glass safe-bottom px-5 pt-3 border-t border-orange-100"><div className="flex gap-3"><button className="btn flex-1 bg-white rounded-2xl py-3 font-black text-orange-700" onClick={()=>setDay((day-1+ITINERARY.length)%ITINERARY.length)}>← 上一天</button><button className="btn flex-1 bg-orange-400 text-white rounded-2xl py-3 font-black" onClick={()=>setDay((day+1)%ITINERARY.length)}>{day===ITINERARY.length-1?'返回第一天':'下一天 →'}</button></div></footer>}
  {modal&&<Modal item={modal} onClose={()=>setModal(null)}/>} 
</div>}
function Trip({day,idx,setDay,setModal}){return <section><div className="card bg-gradient-to-br from-orange-50 to-sky-50"><div className="flex justify-between items-start"><div><div className="text-sm font-black text-orange-500">DAY {idx+1}</div><h2 className="text-2xl font-black text-slate-800">{day.title}</h2></div><div className="text-4xl">{day.dayIcon}</div></div><div className="mt-3"><Weather cities={day.weatherCities}/></div><div className="flex gap-1 mt-4 overflow-x-auto">{ITINERARY.map((x,i)=><button key={x.date} onClick={()=>setDay(i)} className={'px-3 py-2 rounded-full text-xs font-black whitespace-nowrap '+(i===idx?'bg-orange-400 text-white':'bg-white border border-orange-100 text-orange-700')}>{x.date}</button>)}</div></div>{day.items.map((it,i)=><div className="item-card" key={i}><div className="flex gap-3"><div className="text-3xl pt-1">{it.icon}</div><div className="flex-1 min-w-0"><div className="text-xs font-black text-orange-500">{it.time||'備註'}</div><div className="font-black text-lg text-slate-800 break-words">{it.name}</div>{it.highlight&&<div className="mt-2 rounded-2xl bg-amber-50 border border-amber-200 p-2 text-sm font-bold text-amber-800 whitespace-pre-line">⭐ {it.highlight}</div>}<div className="flex gap-2 mt-3 flex-wrap"><button onClick={()=>setModal(it)} className="tag">詳細</button><a className="tag" href={mapUrl(it)} target="_blank">地圖</a></div></div></div></div>)}</section>}
function Modal({item,onClose}){return <div className="modal-wrap"><div className="modal"><div className="flex justify-between gap-3 mb-3"><div><div className="text-xs text-orange-500 font-black">{item.time}</div><h3 className="text-xl font-black">{item.icon} {item.name}</h3></div><button onClick={onClose} className="w-11 h-11 rounded-full bg-orange-100 text-orange-700 font-black">×</button></div><div className="modal-body text-base text-slate-700">{item.highlight&&<div className="mb-3 bg-amber-50 border border-amber-200 rounded-2xl p-3 font-bold">⭐ {item.highlight}</div>}{item.intro||'目前 Excel 沒有填寫額外說明，可之後再補。'}</div><a className="btn mt-4 text-center bg-orange-400 text-white rounded-2xl py-3 font-black" href={mapUrl(item)} target="_blank">打開 Google Maps</a></div></div>}
function Food(){return <section><div className="card"><h2 className="text-xl font-black">🍽️ 美食備忘錄</h2><p className="text-sm text-slate-500 font-bold">依 Excel「美食」分頁整理，適合臨時換餐廳時查。</p></div>{FOOD_LIST.map((f,i)=><div className="item-card" key={i}><div className="font-black text-lg">{f.name}</div><div className="text-sm text-orange-600 font-bold">{f.food||''}</div><div className="text-sm mt-1 whitespace-pre-line">{f.hours?'營業：'+f.hours+'\n':''}{f.note?'備註：'+f.note+'\n':''}{f.loc||''}</div>{f.map&&<a className="tag mt-3" href={f.map} target="_blank">地圖</a>}</div>)}</section>}
function List({checked,toggle}){const groups=[['購物重點',SHOPPING_LIST],['停車場備忘',PARKING_LIST]];return <section>{groups.map(([title,arr])=><div className="card" key={title}><h2 className="text-xl font-black mb-3">{title}</h2>{arr.map((x,i)=>{const key=title+i;return <div className="flex gap-3 py-2 border-b border-orange-50" key={key} onClick={()=>toggle(key)}><div className={'check '+(checked(key)?'on':'')}>{checked(key)?'✓':''}</div><div><div className="font-black">{x.name}</div><div className="text-sm text-slate-500 whitespace-pre-line">{x.note||x.hours||x.loc}</div></div></div>})}</div>)}</section>}
function Money(){
  const [rows,setRows]=useState(()=>JSON.parse(localStorage.getItem('okinawa_money_rows')||'[]'));
  const [rate,setRate]=useState(()=>Number(localStorage.getItem('jpy_rate')||'0.225'));
  const [form,setForm]=useState({item:'',payer:'我',method:'現金',amount:''});

  useEffect(()=>localStorage.setItem('okinawa_money_rows',JSON.stringify(rows)),[rows]);
  useEffect(()=>localStorage.setItem('jpy_rate',rate),[rate]);

  const totalJPY=rows.reduce((s,r)=>s+(Number(r.amount)||0),0);
  const totalTWD=Math.round(totalJPY*rate);

  function add(){
    if(!form.item||!form.amount)return;
    setRows([...rows,{...form,amount:Number(form.amount)}]);
    setForm({item:'',payer:'我',method:'現金',amount:''});
  }

  return <section>
    <div className="card">
      <h2 className="text-xl font-black">💰 沖繩記帳</h2>

      <div className="mt-4 bg-orange-50 border border-orange-200 rounded-3xl p-4">
        <div className="text-sm font-black text-orange-600">目前日圓換算匯率（台銀外幣現金賣出）</div>
        <div className="flex gap-2 mt-2 items-center">
          <input
            className="border rounded-2xl p-3 flex-1"
            inputMode="decimal"
            value={rate}
            onChange={e=>setRate(Number(e.target.value)||0)}
          />
          <div className="font-black text-slate-500">TWD / JPY</div>
        </div>
      </div>

      <div className="grid grid-cols-2 gap-2 mt-4">
        <input
          className="border rounded-2xl p-3 col-span-2"
          placeholder="支出項目"
          value={form.item}
          onChange={e=>setForm({...form,item:e.target.value})}
        />

        <select
          className="border rounded-2xl p-3"
          value={form.payer}
          onChange={e=>setForm({...form,payer:e.target.value})}
        >
          <option>我</option>
          <option>大姐</option>
          <option>豬豬</option>
          <option>肥</option>
          <option>佩蒂</option>
        </select>

        <select
          className="border rounded-2xl p-3"
          value={form.method}
          onChange={e=>setForm({...form,method:e.target.value})}
        >
          <option>現金</option>
          <option>信用卡</option>
        </select>

        <input
          className="border rounded-2xl p-3 col-span-2"
          inputMode="numeric"
          placeholder="金額（日圓）"
          value={form.amount}
          onChange={e=>setForm({...form,amount:e.target.value.replace(/\D/g,'')})}
        />

        <button onClick={add} className="btn col-span-2 bg-orange-400 text-white rounded-2xl py-3 font-black">
          新增支出
        </button>
      </div>
    </div>

    <div className="card bg-gradient-to-br from-orange-50 to-amber-50">
      <div className="text-sm font-black text-orange-500">總支出</div>
      <div className="text-3xl font-black text-slate-800 mt-1">¥ {totalJPY.toLocaleString()}</div>
      <div className="text-xl font-black text-orange-500 mt-1">≈ NT$ {totalTWD.toLocaleString()}</div>
    </div>

    {rows.map((r,i)=>{
      const twd=Math.round(r.amount*rate);
      return <div className="item-card" key={i}>
        <div className="flex justify-between items-start gap-3">
          <div>
            <div className="font-black text-lg">{r.item}</div>
            <div className="flex gap-2 mt-2 flex-wrap">
              <span className="tag">👤 {r.payer}</span>
              <span className="tag">💳 {r.method}</span>
            </div>
          </div>

          <div className="text-right">
            <div className="font-black text-orange-500 text-lg">¥ {r.amount.toLocaleString()}</div>
            <div className="text-sm font-bold text-slate-500">NT$ {twd.toLocaleString()}</div>
          </div>
        </div>
      </div>
    })}
  </section>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
