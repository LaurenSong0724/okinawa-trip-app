body{
  margin:0;
  font-family:'TripFont','Noto Sans TC',system-ui,sans-serif;
  background:#e0f7ff;
  color:#1e293b;
  overflow:hidden;
  user-select:none;
  line-height:1.55;
}
.app-outer{
  min-height:100vh;
  display:flex;
  justify-content:center;
  background:linear-gradient(rgba(255,255,255,.15),rgba(255,247,237,.22)),var(--okinawa-bg);
  background-size:cover;
  background-position:center;
}
@supports(height:100dvh){.app-outer{min-height:100dvh}}
.app-shell{
  width:100%;
  max-width:460px;
  height:100vh;
  position:relative;
  overflow:hidden;
  background:rgba(255,250,245,.42);
  box-shadow:0 0 45px rgba(15,23,42,.16);
}
.app-shell:before{
  content:"";
  position:absolute;
  inset:0;
  z-index:-2;
  background:linear-gradient(rgba(255,255,255,.10),rgba(255,250,245,.26)),var(--okinawa-bg);
  background-size:cover;
  background-position:center top;
}
@supports(height:100dvh){.app-shell{height:100dvh}}
.glass{
  background:rgba(255,250,245,.92);
  backdrop-filter:blur(16px);
}
.scroll{
  height:100%;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:190px 18px 134px;
}
.scroll::-webkit-scrollbar{width:4px}
.scroll::-webkit-scrollbar-thumb{background:#38bdf8;border-radius:10px}
.card{
  background:rgba(255,255,255,.90);
  border:2px solid rgba(186,230,253,.9);
  border-radius:34px;
  padding:1.05rem;
  margin-bottom:1rem;
  box-shadow:0 10px 24px rgba(14,165,233,.10);
}
.item-card{
  background:rgba(255,255,255,.93);
  backdrop-filter:blur(10px);
  border-radius:32px;
  padding:1rem;
  margin-bottom:.9rem;
  border:2px solid rgba(186,230,253,.86);
  box-shadow:0 8px 18px rgba(14,165,233,.08);
}
.btn{
  transition:.16s;
  box-shadow:0 5px 0 #7dd3fc;
  border:2px solid #bae6fd;
}
.btn:active{transform:translateY(3px);box-shadow:0 2px 0 #7dd3fc}
.tab{
  border-radius:999px;
  padding:.55rem .8rem;
  font-weight:900;
  font-size:.75rem;
}
.tab.active{background:#0ea5e9;color:white}
.tab:not(.active){background:white;color:#0369a1;border:1px solid #bae6fd}
.tag{
  display:inline-flex;
  align-items:center;
  gap:4px;
  border-radius:999px;
  background:#f0f9ff;
  border:1px solid #bae6fd;
  color:#0369a1;
  padding:4px 10px;
  font-size:.68rem;
  font-weight:900;
  text-decoration:none;
}
.note-box{
  margin-top:.7rem;
  border:1px solid #fde68a;
  background:#fffbeb;
  color:#92400e;
  border-radius:20px;
  padding:.55rem .7rem;
  font-weight:900;
  font-size:.82rem;
  white-space:pre-line;
}
.cinna-icon-frame{
  width:50px;
  height:50px;
  flex:none;
  border-radius:18px;
  background:linear-gradient(135deg,#ffffff 0%,#e0f7ff 100%);
  border:2px solid #bae6fd;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  box-shadow:0 5px 12px rgba(14,165,233,.14);
}
.cinna-icon-frame img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  filter:brightness(1.24) saturate(1.18) contrast(.98);
  transform:scale(1.13);
  display:block;
}
.cinna-mini{
  width:60px;
  height:60px;
  flex:none;
  border-radius:20px;
  background:#f0f9ff;
  border:2px solid #bae6fd;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  box-shadow:0 6px 14px rgba(14,165,233,.18);
}
.cinna-mini img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  filter:brightness(1.22) saturate(1.2) contrast(.98);
  transform:scale(1.08);
}
.modal-wrap{
  position:absolute;
  inset:0;
  z-index:80;
  background:rgba(15,23,42,.60);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
}
.modal{
  width:100%;
  max-height:88%;
  background:rgba(255,255,255,.98);
  border-radius:36px;
  padding:20px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  border:2px solid #bae6fd;
}
.modal-head{display:flex;gap:12px;align-items:flex-start;justify-content:space-between;margin-bottom:12px;flex:none}
.modal-body{
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding-right:8px;
  white-space:pre-line;
  font-size:.92rem;
  color:#334155;
  line-height:1.72;
}
.modal-body::-webkit-scrollbar{width:4px}
.modal-body::-webkit-scrollbar-thumb{background:#38bdf8;border-radius:10px}
.close-btn{
  width:42px;
  height:42px;
  border-radius:999px;
  background:#e0f2fe;
  color:#0369a1;
  border:0;
  font-weight:1000;
  font-size:24px;
  flex:none;
}
.safe-bottom{padding-bottom:calc(env(safe-area-inset-bottom,0px) + .7rem)}
.welcome-screen{
  position:fixed;
  inset:0;
  z-index:999999;
  background:var(--okinawa-bg);
  background-size:cover;
  background-position:center;
}
.welcome-layer{
  position:absolute;
  inset:0;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding:22px 18px calc(env(safe-area-inset-bottom,0px) + 28px);
  background:linear-gradient(to bottom,rgba(0,0,0,.02) 0%,rgba(0,0,0,.06) 45%,rgba(0,83,128,.38) 100%);
}
.welcome-content{
  width:100%;
  max-width:420px;
  background:rgba(255,255,255,.90);
  backdrop-filter:blur(14px);
  border:2px solid rgba(255,255,255,.72);
  border-radius:34px;
  padding:24px 20px;
  text-align:center;
  box-shadow:0 18px 48px rgba(15,23,42,.25);
}
.welcome-cinna-icon{width:72px;height:72px;border-radius:24px;object-fit:cover;background:#fff;border:2px solid #bae6fd;box-shadow:0 6px 16px rgba(14,165,233,.18);margin:0 auto 8px;filter:brightness(1.24) saturate(1.18);}
.welcome-title-small{font-size:.72rem;font-weight:1000;letter-spacing:.16em;color:#0284c7}
.welcome-title{margin-top:7px;font-size:1.9rem;font-weight:1000;color:#0f172a;line-height:1.15}
.welcome-desc{margin-top:10px;font-size:.86rem;font-weight:850;color:#475569}
.welcome-enter-btn{width:100%;margin-top:20px;border:none;border-radius:22px;padding:15px 18px;background:#0ea5e9;color:white;font-size:1rem;font-weight:1000;box-shadow:0 6px 0 #0369a1}
.welcome-enter-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #0369a1}
.check{width:28px;height:28px;border-radius:9px;border:2px solid #38bdf8;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;flex:none}
.check.on{background:#0ea5e9}
</style>
</head>
<body>
<div class="app-outer"><div class="app-shell"><div id="root"></div></div></div>

const {useState,useEffect} = React;
const ITINERARY = [{"date": "7月22日(三)", "title": "7月22日(三) 沖繩行程", "items": [{"time": "07:00", "name": "出發前往台中清泉崗機場", "intro": "各自乘坐UBER過去，因為交流道下來那裡會塞車，建議早點出門", "note": "", "nav": "https://maps.app.goo.gl/vsnDYM284t1UXRjv8", "icon": "flight"}, {"time": "10:00-12:40", "name": "出發前往日本沖繩", "intro": "乘坐華航CI310出發前往日本沖繩", "note": "", "nav": "https://maps.app.goo.gl/vsnDYM284t1UXRjv8", "icon": "flight"}, {"time": "12:40-13:30", "name": "那霸機場入境後坐機場接送到OTS", "intro": "-到達那霸機場領取行李入境後，向右走(國內線方向)，走到盡頭看到手扶梯\n-搭乘手扶梯上二樓後左轉，再右轉進到長廊然後直走\n-搭乘手扶梯下到國內線1樓，並前往4號出口\n-4號出口出來後穿過人行道，「10-A（R-10）」接駁站在左側", "note": "", "nav": "https://maps.app.goo.gl/PVgFiCk8jkHEqPzy8", "icon": "flight"}, {"time": "14:00", "name": "OTS臨空豐崎營業所租車", "intro": "-每10~20分鐘發車一班，路程約10~15分鐘\n-Suzuki Solio Hybrid\n-39050日圓，現場付款", "note": "39050日圓，現場付款", "nav": "https://maps.app.goo.gl/ZwNGbSp6ZQdcQ21A9", "icon": "car"}, {"time": "14:30-15:00", "name": "波上宮", "intro": "波上宮是沖繩那霸最具代表性的神社，也是「琉球八社」之首\n建於珊瑚礁懸崖上，擁有沖繩傳統紅瓦屋頂，俯瞰著碧藍的「波之上海灘」\n自古以來被視為守護海上安全、漁獲豐收與心靈平靜的神聖之地\n-供奉神明： 熊野三神(伊弉冊尊、速玉男尊、事解男尊)\n-主要祈求結緣、安產、除厄與旅行平安\n-特色御守： 小書包交通御守、貝殼結緣御守\n-最佳拍照點： 沿著神社後方的「波之上臨港道路」，可以捕捉到波上宮矗立在崖上的絕美全景", "note": "宮前的停車場限停30分鐘\n若想待久可以停若狹海濱公園停車場(Wakasa Seaside Park Parking Lot)", "nav": "https://maps.app.goo.gl/ZERwCS3ZKrmutkbF6", "icon": "shrine"}, {"time": "15:30-16:30", "name": "首里城", "intro": "首里城是琉球王國最高權力與文化的象徵，融合了中國與日本的建築風格，朱紅色外牆、華麗的龍柱以及飛簷屋脊，展現出獨特的琉球美學\n正殿不僅是國王處理政務的地方，也是舉行重大典禮、接待冊封使的重要場域，被列為世界文化遺產「琉球王國的城堡以及相關遺產群」的一部分\n免付費：守禮門、園比屋武御嶽石門、歡會門、瑞泉門、漏刻門及廣福門", "note": "", "nav": "https://maps.app.goo.gl/J3XYtXkPhy1mP29D8", "icon": "shrine"}, {"time": "17:00-17:30", "name": "首里西來院達摩寺", "intro": "首里西來院達摩寺是位於沖繩那霸市首里城附近的一座臨濟宗妙心寺派寺院\n寺院內外擺放著大大小小、表情各異的達摩不倒翁，是求事業、轉職、創業與考試突破的熱門參拜點\n寺院內設有一座縮小版的千本鳥居步道，是非常熱門的拍照打卡點\n供奉神明：包含祈求好姻緣的「良緣地藏」、斬斷惡緣的「緣切不動明王」、主管智慧且保佑考試及格的「文殊菩薩」，以及庇佑商業繁盛的「稻荷大神」與可愛的狐狸使者\n特色御守：達摩御守、 提升財運與事業運的金運守、安產守、子育守、交通安全守，還能購買到波上宮也有的小書包御守、七福神、十德籤以及多款串珠御守\n\n(以下打星號特別備註)\n可導航至西來院，寺廟對面設有免費停車場（約4-6個車位），因巷弄較窄，行車需放慢速度", "note": "", "nav": "https://maps.app.goo.gl/2y4FBDDByY6hHKaU6", "icon": "shrine"}, {"time": "18:00-18:30", "name": "三麗鷗飯店check in放行李", "intro": "沖繩唯一一間三麗鷗主題風格酒店，一出門就是國際通", "note": "因無特約停車場，需停在收費停車場後步行去飯店", "nav": "https://maps.app.goo.gl/Q1SqEwfJn6vDR59S8", "icon": "hotel"}, {"time": "18:30-", "name": "國際通商店街購物、晚餐", "intro": "美麗海直營店：是水族館唯一的官方直營商店\n必買人氣商品↓\n千圓抽獎活動：店內超人氣的 ¥1000 抽獎，抽抽有獎，保底能帶走一隻可愛的鯨鯊娃娃\n生日泳圈鯨鯊系列：可自由選擇月份鯨鯊與日期泳圈進行組合，非常具備紀念意義的熱門伴手禮\n沖繩限定販售：有著鯨鯊圖案的鋁罐蘇打\n海洋明星絨毛玩偶/背包：經典的鯨鯊、海龜、花園鰻等造型娃娃，款式齊全\n水族館限定扭蛋：一顆約 ¥500，做工精緻，包含海牛、魟魚等造型，深受遊客喜愛\n生活實用小物：如海洋生物造型的兒童餐盤、筷架、文具及吊飾等", "note": "", "nav": "https://www.google.com/maps/search/?api=1&query=國際通商店街購物、晚餐 沖繩", "icon": "food"}, {"time": "", "name": "", "intro": "Bic Camera Select 那霸國際通店：是沖繩首間大型直營店，店內除了熱門的美容家電與相機，也特別規劃沖繩主題伴手禮專區", "note": "", "nav": "", "icon": "default"}, {"time": "", "name": "", "intro": "札幌藥妝 沖繩國際通店：源自日本北海道的知名藥妝連鎖品牌，以豐富的醫藥品、美妝保養、母嬰用品與北海道獨家伴手禮聞名\n必買推薦清單沖繩限定保養品： 沖繩限定版 Lululun 面膜\n沖繩特色零食： Calbee 沖繩香檬口味洋芋片、BOURBON 紅芋夾心威化餅、沖繩限定口味嗨啾 (HI-CHEW)\n札幌藥妝獨家保健品： Wellness Navi 系列產品（如防宿醉的 NO-MO、舒壓的 GABAX 等）\n經典人氣藥妝： 合利他命強效錠、PAIR ACNE 痘痘膏、參天 FX NEO 清涼眼藥水、大正漢方胃腸藥等等", "note": "", "nav": "", "icon": "default"}, {"time": "", "name": "", "intro": "Calbee+沖繩國際通店：除了販售洋芋片零食之外，還有各式店內現做美食。透過透明玻璃可以直接看到食物在開放式廚房內製作的過程\n必點現炸：紅芋薯條、經典薯條、黑糖口味馬鈴薯吉拿棒\n必買的兩款：「黑糖美麗薯塊」及「海苔鹽薯塊」，也是店內的明星產品，機場免稅店買不到的", "note": "", "nav": "", "icon": "default"}, {"time": "", "name": "", "intro": "首里石鹼 國際通松尾店：", "note": "", "nav": "", "icon": "default"}, {"time": "", "name": "", "intro": "塩の専門店 塩屋 國際通店：專售獲世界紀錄認證的「雪鹽」，可以品嚐各種特色鹽味冰淇淋，並嘗試撒上柚子鹽、抹茶鹽等創意吃法", "note": "", "nav": "", "icon": "default"}, {"time": "", "name": "", "intro": "南星莎布翁（SuiSavon）：沙翁(沖繩傳統小吃)", "note": "", "nav": "", "icon": "default"}, {"time": "", "name": "", "intro": "はちよん シーサー焼き：風獅爺燒(推薦紅薯口味)", "note": "", "nav": "", "icon": "default"}, {"time": "", "name": "", "intro": "文化屋雜貨店：OKINAWA文化屋雜貨店是沖繩國際通上規模最大、裝潢最浮誇的指標性特產店，主打「一站式購足」沖繩限定動漫周邊與在地伴手禮\n推薦必買：沖繩限定曬黑娃娃(限定版吉伊卡哇)、Orion 啤酒聯名 T-Shirt、沖繩風獅爺手工藝品、紅芋與黑糖特產點心、泡盛酒與香檬風味飲品", "note": "", "nav": "", "icon": "defau       <div className="text-xs font-black text-sky-600 tracking-widest">OKINAWA FAMILY TRIP</div>
      <div className="flex items-end justify-between gap-2">
        <div><h1 className="text-2xl font-black text-slate-800 leading-tight">2026 沖繩親子旅行</h1><p className="text-sm text-slate-500 font-bold">7/22（三）～ 7/27（一）｜自駕・購物・親子景點</p></div>
        <div className="cinna-mini"><img src={imgSrc('default')} /></div>
      </div>
      <div className="flex gap-2 mt-3">
        {['trip','food','list','money'].map((t,i)=><button key={t} onClick={()=>setTab(t)} className={'tab '+(tab===t?'active':'')}>{['行程','美食','清單','記帳'][i]}</button>)}
      </div>
    </header>
    <main className="scroll">
      {tab==='trip'&&<Trip day={d} idx={day} setDay={setDay} setModal={setModal}/>}
      {tab==='food'&&<Food/>}
      {tab==='list'&&<List checked={checked} toggle={toggle}/>}
      {tab==='money'&&<Money/>}
    </main>
    {tab==='trip'&&<footer className="absolute bottom-0 left-0 right-0 z-40 glass safe-bottom px-5 pt-3 border-t border-sky-100"><div className="flex gap-3"><button className="btn flex-1 bg-white rounded-2xl py-3 font-black text-sky-700" onClick={()=>setDay((day-1+ITINERARY.length)%ITINERARY.length)}>← 上一天</button><button className="btn flex-1 bg-orange-400 text-white rounded-2xl py-3 font-black" onClick={()=>setDay((day+1)%ITINERARY.length)}>{day===ITINERARY.length-1?'返回第一天':'下一天 →'}</button></div></footer>}
    {modal&&<Modal item={modal} onClose={()=>setModal(null)}/>}
  </div>
}
function Trip({day,idx,setDay,setModal}){
  return <section>
    <div className="card">
      <div className="flex justify-between items-start gap-3"><div><div className="text-sm font-black text-sky-600">DAY {idx+1}</div><h2 className="text-2xl font-black text-slate-800">{day.title}</h2></div><div className="cinna-mini"><img src={imgSrc('ocean')} /></div></div>
      <div className="mt-3"><Weather/></div>
      <div className="flex gap-1 mt-4 overflow-x-auto">{ITINERARY.map((x,i)=><button key={x.date} onClick={()=>setDay(i)} className={'px-3 py-2 rounded-full text-xs font-black whitespace-nowrap '+(i===idx?'bg-sky-500 text-white':'bg-white border border-sky-100 text-sky-700')}>{x.date.replace('月','/').replace('日','')}</button>)}</div>
    </div>
    {day.items.map((it,i)=><div className="item-card" key={i}>
      <div className="flex gap-3 items-start">
        <div className="cinna-icon-frame"><img src={imgSrc(it.icon)} /></div>
        <div className="flex-1 min-w-0">
          <div className="text-sm font-black text-orange-500">{it.time||'備註'}</div>
          <div className="font-black text-xl text-slate-800 break-words">{it.name}</div>
          {it.note&&<div className="note-box">⭐ {it.note}</div>}
          <div className="flex gap-2 mt-3 flex-wrap">
            <a className="tag" href={mapUrl(it)} target="_blank">導航</a>
            <button className="tag" onClick={()=>setModal(it)}>景點介紹</button>
          </div>
        </div>
      </div>
    </div>)}
  </section>
}
function Modal({item,onClose}){
  return <div className="modal-wrap"><div className="modal">
    <div className="modal-head">
      <div className="flex gap-3 items-start"><div className="cinna-icon-frame"><img src={imgSrc(item.icon)} /></div><div><div className="text-xs text-orange-500 font-black">{item.time}</div><h3 className="text-xl font-black text-slate-800">{item.name}</h3></div></div>
      <button onClick={onClose} className="close-btn">×</button>
    </div>
    <div className="modal-body">{item.intro || '目前 Excel 沒有填寫景點介紹。'}{item.note ? '\n\n⭐ '+item.note : ''}</div>
    <div className="mt-4 flex gap-2 flex-none"><a className="btn flex-1 text-center bg-sky-500 text-white rounded-2xl py-3 font-black" href={mapUrl(item)} target="_blank">打開 Google 地圖</a></div>
  </div></div>
}
function Food(){return <section><div className="card"><h2 className="text-xl font-black">🍽️ 美食備忘錄</h2><p className="text-sm text-slate-500 font-bold">依 Excel「美食」分頁整理。</p></div>{FOOD_LIST.map((f,i)=><div className="item-card" key={i}><div className="flex gap-3"><div className="cinna-icon-frame"><img src={imgSrc('food')} /></div><div className="flex-1"><div className="font-black text-lg">{f.name}</div><div className="text-sm text-orange-600 font-bold">{f.point||''}</div><div className="text-sm mt-1 whitespace-pre-line">{f.hours?'營業：'+f.hours+'\n':''}{f.note?'備註：'+f.note+'\n':''}{f.loc||''}</div>{f.map&&<a className="tag mt-3" href={f.map} target="_blank">導航</a>}</div></div></div>)}</section>}
function List({checked,toggle}){
  const groups=[['購物重點',SHOPPING_LIST,'shopping'],['停車場備忘',PARKING_LIST,'car']];
  return <section>{groups.map(([title,arr,icon])=><div className="card" key={title}><h2 className="text-xl font-black mb-3">{title}</h2>{arr.map((x,i)=>{const key=title+i;return <div className="flex gap-3 py-2 border-b border-sky-50" key={key} onClick={()=>toggle(key)}><div className={'check '+(checked[key]?'on':'')}>{checked[key]?'✓':''}</div><div><div className="font-black">{x.name}</div><div className="text-sm text-slate-500 whitespace-pre-line">{x.time||''}{x.note?'\n'+x.note:''}</div>{x.url&&<a onClick={e=>e.stopPropagation()} className="tag mt-2" href={x.url} target="_blank">導航</a>}</div></div>})}</div>)}</section>
}
function Money(){
  const [rows,setRows]=useState(()=>JSON.parse(localStorage.getItem('okinawa_money_rows')||'[]'));
  const [rate,setRate]=useState(()=>Number(localStorage.getItem('jpy_rate')||'0.225'));
  const [form,setForm]=useState({item:'',payer:'我',method:'現金',amount:''});
  useEffect(()=>localStorage.setItem('okinawa_money_rows',JSON.stringify(rows)),[rows]);
  useEffect(()=>localStorage.setItem('jpy_rate',rate),[rate]);
  const totalJPY=rows.reduce((s,r)=>s+(Number(r.amount)||0),0);
  const totalTWD=Math.round(totalJPY*rate);
  function add(){if(!form.item||!form.amount)return;setRows([...rows,{...form,amount:Number(form.amount)}]);setForm({item:'',payer:'我',method:'現金',amount:''})}
  return <section><div className="card"><h2 className="text-xl font-black">💰 沖繩記帳</h2><div className="mt-4 bg-sky-50 border border-sky-200 rounded-3xl p-4"><div className="text-sm font-black text-sky-700">日圓換算匯率（台銀外幣現金賣出）</div><input className="border rounded-2xl p-3 w-full mt-2" inputMode="decimal" value={rate} onChange={e=>setRate(Number(e.target.value)||0)} /></div><div className="grid grid-cols-2 gap-2 mt-4"><input className="border rounded-2xl p-3 col-span-2" placeholder="支出項目" value={form.item} onChange={e=>setForm({...form,item:e.target.value})}/><select className="border rounded-2xl p-3" value={form.payer} onChange={e=>setForm({...form,payer:e.target.value})}>{['我','大姐','豬豬','肥','佩蒂'].map(x=><option key={x}>{x}</option>)}</select><select className="border rounded-2xl p-3" value={form.method} onChange={e=>setForm({...form,method:e.target.value})}><option>現金</option><option>信用卡</option></select><input className="border rounded-2xl p-3 col-span-2" inputMode="numeric" placeholder="金額（日圓）" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value.replace(/\D/g,'')})}/><button onClick={add} className="btn col-span-2 bg-orange-400 text-white rounded-2xl py-3 font-black">新增支出</button></div></div><div className="card"><div className="text-sm font-black text-sky-600">總支出</div><div className="text-3xl font-black">¥ {totalJPY.toLocaleString()}</div><div className="text-xl font-black text-orange-500">≈ NT$ {totalTWD.toLocaleString()}</div></div>{rows.map((r,i)=><div className="item-card" key={i}><div className="flex justify-between"><div><div className="font-black">{r.item}</div><div className="flex gap-2 mt-2"><span className="tag">👤 {r.payer}</span><span className="tag">💳 {r.method}</span></div></div><div className="text-right"><div className="font-black text-orange-500">¥ {r.amount.toLocaleString()}</div><div className="text-sm text-slate-500">NT$ {Math.round(r.amount*rate).toLocaleString()}</div></div></div></div>)}</section>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
